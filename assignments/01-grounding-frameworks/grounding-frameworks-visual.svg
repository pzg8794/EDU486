<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">JuST and Technology: From Access to Agency</title>
  <desc id="desc">A four-part justice-centered STEM cycle showing planning, eliciting student ideas, revising with diverse perspectives, and using science for action. Technology can support, complicate, or constrain each part. The examples come from the Invisible Invaders suspected-microplastics camp plan.</desc>
  <defs>
    <marker id="arrow" markerWidth="11" markerHeight="11" refX="9" refY="5.5" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L11,5.5 L0,11 z" fill="#123047"/>
    </marker>
    <marker id="return-arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="userSpaceOnUse">
      <path d="M0,0 L12,6 L0,12 z" fill="#123047"/>
    </marker>
    <style>
      text { font-family: Arial, Helvetica, sans-serif; letter-spacing: 0; }
      .ink { fill: #123047; }
      .white { fill: #ffffff; }
      .muted { fill: #496273; }
      .title { font-size: 36px; font-weight: 700; }
      .subtitle { font-size: 18px; font-weight: 700; }
      .thesis { font-size: 20px; font-weight: 700; }
      .band { font-size: 21px; font-weight: 700; }
      .card-title { font-size: 19px; font-weight: 700; }
      .card-text { font-size: 17px; }
      .small { font-size: 13.5px; }
      .lens-title { font-size: 22px; font-weight: 700; }
      .lens-text { font-size: 18px; }
      .question { font-size: 18px; font-weight: 700; }
      .number { font-size: 24px; font-weight: 700; text-anchor: middle; dominant-baseline: middle; }
    </style>
  </defs>

  <rect width="1600" height="900" fill="#F7FAFC"/>
  <rect x="0" y="0" width="18" height="900" fill="#D33F72"/>

  <text id="visual-title" x="48" y="51" class="title ink">JuST + Technology: From Access to Agency</text>
  <text x="48" y="84" class="subtitle muted">Piter Garcia | EDU486 | Part 1 | July 14, 2026</text>

  <rect x="48" y="105" width="1504" height="55" rx="6" fill="#123047"/>
  <text x="800" y="139" class="thesis white" text-anchor="middle">Technology reshapes relationships among youth, community, evidence, and action. It is never just an add-on.</text>

  <rect x="48" y="177" width="1504" height="62" rx="6" fill="#F2C94C" stroke="#123047" stroke-width="2"/>
  <text x="800" y="203" class="band ink" text-anchor="middle">JuST CORE: Cultivating a justice-centered community</text>
  <text x="800" y="227" class="card-text ink" text-anchor="middle">Belonging | trust | identity safety | language access | bodymind variability | shared purpose</text>

  <!-- Four-part JuST cycle -->
  <line x1="404" y1="414" x2="427" y2="414" stroke="#123047" stroke-width="5" marker-end="url(#arrow)"/>
  <line x1="787" y1="414" x2="810" y2="414" stroke="#123047" stroke-width="5" marker-end="url(#arrow)"/>
  <line x1="1170" y1="414" x2="1193" y2="414" stroke="#123047" stroke-width="5" marker-end="url(#arrow)"/>
  <path d="M1508 565 C1540 565 1540 258 1507 258 L92 258 C58 258 58 565 90 565" fill="none" stroke="#123047" stroke-width="3" stroke-dasharray="9 7" marker-end="url(#return-arrow)"/>

  <g id="just-1">
    <rect x="48" y="275" width="356" height="294" rx="6" fill="#FFFFFF" stroke="#D33F72" stroke-width="4"/>
    <circle cx="82" cy="309" r="23" fill="#D33F72"/>
    <text x="82" y="310" class="number white">1</text>
    <text x="116" y="305" class="card-title ink">PLAN</text>
    <text x="72" y="348" class="card-title ink">
      <tspan x="72" dy="0">Planning toward a meaningful</tspan>
      <tspan x="72" dy="25">purpose that centers justice</tspan>
    </text>
    <line x1="72" y1="414" x2="380" y2="414" stroke="#E7A7BD" stroke-width="2"/>
    <text x="72" y="438" class="card-text ink">
      <tspan x="72" dy="0">Why might suspected microplastics</tspan>
      <tspan x="72" dy="23">appear in a parking lot and</tspan>
      <tspan x="72" dy="23">classroom?</tspan>
      <tspan x="72" dy="27" font-weight="700">Technology move:</tspan>
      <tspan x="72" dy="23">Use source photos and a map to frame</tspan>
      <tspan x="72" dy="23">a community question, not a tool demo.</tspan>
    </text>
  </g>

  <g id="just-2">
    <rect x="431" y="275" width="356" height="294" rx="6" fill="#FFFFFF" stroke="#168AAD" stroke-width="4"/>
    <circle cx="465" cy="309" r="23" fill="#168AAD"/>
    <text x="465" y="310" class="number white">2</text>
    <text x="499" y="305" class="card-title ink">ELICIT</text>
    <text x="455" y="348" class="card-title ink">
      <tspan x="455" dy="0">Eliciting student ideas about</tspan>
      <tspan x="455" dy="25">science, culture, and justice</tspan>
    </text>
    <line x1="455" y1="414" x2="763" y2="414" stroke="#A9DCE9" stroke-width="2"/>
    <text x="455" y="438" class="card-text ink">
      <tspan x="455" dy="0">Invite local knowledge, disability culture,</tspan>
      <tspan x="455" dy="23">home language, sensory needs, and</tspan>
      <tspan x="455" dy="23">changing energy.</tspan>
      <tspan x="455" dy="27" font-weight="700">Participation routes:</tspan>
      <tspan x="455" dy="23">Voice | image | text | paper | partner</tspan>
      <tspan x="455" dy="23">Different routes, shared rigorous purpose.</tspan>
    </text>
  </g>

  <g id="just-3">
    <rect x="814" y="275" width="356" height="294" rx="6" fill="#FFFFFF" stroke="#2A9D5B" stroke-width="4"/>
    <circle cx="848" cy="309" r="23" fill="#2A9D5B"/>
    <text x="848" y="310" class="number white">3</text>
    <text x="882" y="305" class="card-title ink">REVISE</text>
    <text x="838" y="348" class="card-title ink">
      <tspan x="838" dy="0">Nurturing revisions in thinking</tspan>
      <tspan x="838" dy="25">and feeling with diverse perspectives</tspan>
    </text>
    <line x1="838" y1="414" x2="1146" y2="414" stroke="#A9DDBE" stroke-width="2"/>
    <text x="838" y="438" class="card-text ink">
      <tspan x="838" dy="0">Compare indoor, outdoor, and blank</tspan>
      <tspan x="838" dy="23">samples; revise models; name uncertainty.</tspan>
      <tspan x="838" dy="27" font-weight="700">Access to evidence:</tspan>
      <tspan x="838" dy="23">Shared microscope view | still image</tspan>
      <tspan x="838" dy="23">| tally. Observation is not confirmation.</tspan>
    </text>
  </g>

  <g id="just-4">
    <rect x="1197" y="275" width="355" height="294" rx="6" fill="#FFFFFF" stroke="#E76F51" stroke-width="4"/>
    <circle cx="1231" cy="309" r="23" fill="#E76F51"/>
    <text x="1231" y="310" class="number white">4</text>
    <text x="1265" y="305" class="card-title ink">ACT</text>
    <text x="1221" y="348" class="card-title ink">
      <tspan x="1221" dy="0">Using science to make a difference</tspan>
      <tspan x="1221" dy="25">and advocate for justice</tspan>
    </text>
    <line x1="1221" y1="414" x2="1528" y2="414" stroke="#F2B6A8" stroke-width="2"/>
    <text x="1221" y="438" class="card-text ink">
      <tspan x="1221" dy="0">Create art, audio, poster, or video</tspan>
      <tspan x="1221" dy="23">for a real audience and actionable future.</tspan>
      <tspan x="1221" dy="27" font-weight="700">Justice move:</tspan>
      <tspan x="1221" dy="23">Name systems, choices, and unequal</tspan>
      <tspan x="1221" dy="23">burdens, not individual blame.</tspan>
    </text>
  </g>

  <g id="outer-commitments">
    <rect x="48" y="592" width="744" height="56" rx="6" fill="#5A2A83"/>
    <text x="420" y="627" class="band white" text-anchor="middle">USING SCIENCE FOR SOCIAL TRANSFORMATION</text>
    <rect x="808" y="592" width="744" height="56" rx="6" fill="#007C78"/>
    <text x="1180" y="627" class="band white" text-anchor="middle">EXPANDING WHAT COUNTS AS SCIENCE</text>
  </g>

  <!-- Technology is a critical design lens across the whole cycle -->
  <g id="technology-lenses">
    <rect x="48" y="669" width="486" height="164" rx="6" fill="#EAF7EF" stroke="#2A9D5B" stroke-width="3"/>
    <text x="72" y="703" class="lens-title ink">TECHNOLOGY CAN SUPPORT</text>
    <text x="72" y="735" class="lens-text ink">
      <tspan x="72" dy="0">Shared microscope view | captions | paper backup</tspan>
      <tspan x="72" dy="24">Maps and tallies make collective patterns visible.</tspan>
    </text>
    <text x="72" y="804" class="question ink">Ask: Who can participate now?</text>

    <rect x="557" y="669" width="486" height="164" rx="6" fill="#FFF7DE" stroke="#D39B00" stroke-width="3"/>
    <text x="581" y="703" class="lens-title ink">TECHNOLOGY CAN COMPLICATE</text>
    <text x="581" y="735" class="lens-text ink">
      <tspan x="581" dy="0">Data can outrank lived knowledge; AI can overclaim.</tspan>
      <tspan x="581" dy="24">Choice can fragment the shared learning purpose.</tspan>
    </text>
    <text x="581" y="804" class="question ink">Ask: What does the tool hide?</text>

    <rect x="1066" y="669" width="486" height="164" rx="6" fill="#FCECEF" stroke="#C33C54" stroke-width="3"/>
    <text x="1090" y="703" class="lens-title ink">TECHNOLOGY CAN CONSTRAIN</text>
    <text x="1090" y="735" class="lens-text ink">
      <tspan x="1090" dy="0">Surveillance, bias, cost, sensory and energy load</tspan>
      <tspan x="1090" dy="24">Wi-Fi, battery, fit, reliability, working memory.</tspan>
    </text>
    <text x="1090" y="804" class="question ink">Ask: Who bears the burden?</text>
  </g>

  <text x="800" y="860" class="small muted" text-anchor="middle">Invisible Invaders examples are plans for camp, not claims about completed teaching. Suspected microplastics require further identification.</text>
  <a href="https://github.com/pzg8794/EDU486/blob/main/assignments/01-grounding-frameworks/grounding-frameworks-part1-submission.md" target="_blank">
    <text x="800" y="882" class="small muted" text-anchor="middle" text-decoration="underline">Click for the full explanation, direct sources, and AI disclosure</text>
  </a>
</svg>
