<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">Same rigorous science, multiple ways in</title>
  <desc id="desc">A neuroinclusive participation map shows four flexible routes into the same science goal: noticing evidence, recording evidence, making meaning, and contributing to the team. Routes include microscope or touch, drawing or audio, speech or home language, and seated or low-energy roles.</desc>
  <defs>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M0,0 L12,6 L0,12 Z" fill="#475569"/>
    </marker>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="5" stdDeviation="6" flood-color="#0f172a" flood-opacity="0.12"/>
    </filter>
  </defs>

  <rect width="1600" height="900" fill="#f8fafc"/>
  <text x="80" y="82" font-family="Arial, sans-serif" font-size="48" font-weight="700" fill="#0f172a">Same Rigorous Science, Multiple Ways In</text>
  <text x="100" y="128" font-family="Arial, sans-serif" font-size="26" fill="#475569">Flexible access changes the route, not the scientific goal</text>

  <g filter="url(#shadow)">
    <rect x="565" y="300" width="470" height="245" rx="18" fill="#ffffff" stroke="#0f172a" stroke-width="5"/>
    <text x="800" y="365" text-anchor="middle" font-family="Arial, sans-serif" font-size="22" font-weight="700" fill="#475569">SHARED SCIENCE GOAL</text>
    <text x="800" y="420" text-anchor="middle" font-family="Arial, sans-serif" font-size="34" font-weight="700" fill="#0f172a">Build and revise a model</text>
    <text x="800" y="465" text-anchor="middle" font-family="Arial, sans-serif" font-size="25" fill="#334155">Use evidence to explain how fibers move,</text>
    <text x="800" y="500" text-anchor="middle" font-family="Arial, sans-serif" font-size="25" fill="#334155">where uncertainty remains, and what should change.</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="75" y="205" width="360" height="210" rx="12" fill="#e3f2fd" stroke="#2563a6" stroke-width="4"/>
    <text x="105" y="250" font-family="Arial, sans-serif" font-size="20" font-weight="700" fill="#2563a6">NOTICE EVIDENCE</text>
    <text x="105" y="300" font-family="Arial, sans-serif" font-size="29" font-weight="700" fill="#0f172a">Look, listen, or touch</text>
    <text x="105" y="345" font-family="Arial, sans-serif" font-size="23" fill="#334155">Microscope or camera</text>
    <text x="105" y="377" font-family="Arial, sans-serif" font-size="23" fill="#334155">Sample handling or observation</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="1165" y="205" width="360" height="210" rx="12" fill="#e8f5e9" stroke="#2f6f3e" stroke-width="4"/>
    <text x="1195" y="250" font-family="Arial, sans-serif" font-size="20" font-weight="700" fill="#2f6f3e">RECORD EVIDENCE</text>
    <text x="1195" y="300" font-family="Arial, sans-serif" font-size="29" font-weight="700" fill="#0f172a">Choose a record</text>
    <text x="1195" y="345" font-family="Arial, sans-serif" font-size="23" fill="#334155">Draw, photograph, tally</text>
    <text x="1195" y="377" font-family="Arial, sans-serif" font-size="23" fill="#334155">Type, dictate, or use cards</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="75" y="565" width="360" height="210" rx="12" fill="#f3e8ff" stroke="#7c3aed" stroke-width="4"/>
    <text x="105" y="610" font-family="Arial, sans-serif" font-size="20" font-weight="700" fill="#6d28d9">MAKE MEANING</text>
    <text x="105" y="660" font-family="Arial, sans-serif" font-size="29" font-weight="700" fill="#0f172a">Communicate your way</text>
    <text x="105" y="705" font-family="Arial, sans-serif" font-size="23" fill="#334155">Speech, chat, drawing</text>
    <text x="105" y="737" font-family="Arial, sans-serif" font-size="23" fill="#334155">Home language or quiet partner</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="1165" y="565" width="360" height="210" rx="12" fill="#fff4e5" stroke="#b45309" stroke-width="4"/>
    <text x="1195" y="610" font-family="Arial, sans-serif" font-size="20" font-weight="700" fill="#b45309">CONTRIBUTE</text>
    <text x="1195" y="660" font-family="Arial, sans-serif" font-size="29" font-weight="700" fill="#0f172a">Use a sustainable role</text>
    <text x="1195" y="705" font-family="Arial, sans-serif" font-size="23" fill="#334155">Seated or low-energy option</text>
    <text x="1195" y="737" font-family="Arial, sans-serif" font-size="23" fill="#334155">Role changes and breaks</text>
  </g>

  <path d="M445 310 C500 310, 515 355, 550 385" fill="none" stroke="#475569" stroke-width="5" marker-end="url(#arrow)"/>
  <path d="M1155 310 C1100 310, 1085 355, 1050 385" fill="none" stroke="#475569" stroke-width="5" marker-end="url(#arrow)"/>
  <path d="M445 670 C510 670, 520 545, 570 510" fill="none" stroke="#475569" stroke-width="5" marker-end="url(#arrow)"/>
  <path d="M1155 670 C1090 670, 1080 545, 1030 510" fill="none" stroke="#475569" stroke-width="5" marker-end="url(#arrow)"/>

  <rect x="400" y="805" width="800" height="70" rx="12" fill="#0f172a"/>
  <text x="800" y="832" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="700" fill="#ffffff">ACCESS STANDARD</text>
  <text x="800" y="861" text-anchor="middle" font-family="Arial, sans-serif" font-size="25" font-weight="700" fill="#ffffff">Access barriers are not thinking barriers.</text>
</svg>
