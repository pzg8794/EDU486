<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="1000" viewBox="0 0 1600 1000" role="img" aria-labelledby="title desc">
  <title id="title">How invisible invaders reach both samples</title>
  <desc id="desc">Outdoor tire wear, road dust, litter, and paint combine with indoor textiles, furnishings, and tracked dust. Air, activity, rain, and runoff move particles. Gravity and contact deposit them in parking-lot and classroom samples. Microscopy identifies suspected particles, while blanks and spectroscopy strengthen the evidence.</desc>
  <defs>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M0,0 L12,6 L0,12 Z" fill="#475569"/>
    </marker>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="5" stdDeviation="6" flood-color="#0f172a" flood-opacity="0.12"/>
    </filter>
  </defs>

  <rect width="1600" height="1000" fill="#f8fafc"/>
  <text x="80" y="76" font-family="Arial, sans-serif" font-size="48" font-weight="700" fill="#0f172a">How Invisible Invaders Reach Both Samples</text>
  <text x="82" y="122" font-family="Arial, sans-serif" font-size="25" fill="#475569">A closed classroom is not sealed, and a visible particle is not automatically confirmed plastic</text>

  <g filter="url(#shadow)">
    <rect x="80" y="190" width="450" height="220" rx="8" fill="#fff4e5" stroke="#b45309" stroke-width="4"/>
    <text x="112" y="235" font-family="Arial, sans-serif" font-size="20" font-weight="700" fill="#b45309">OUTDOOR SOURCES [SCIENCE]</text>
    <text x="112" y="288" font-family="Arial, sans-serif" font-size="32" font-weight="700" fill="#0f172a">Parking lot</text>
    <text x="112" y="334" font-family="Arial, sans-serif" font-size="24" fill="#334155">Tire and road wear</text>
    <text x="112" y="367" font-family="Arial, sans-serif" font-size="24" fill="#334155">Litter, paint, older plastic</text>
    <text x="112" y="398" font-family="Arial, sans-serif" font-size="21" fill="#7c2d12">Friction + weathering release particles</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="80" y="485" width="450" height="220" rx="8" fill="#e8f5e9" stroke="#2f6f3e" stroke-width="4"/>
    <text x="112" y="530" font-family="Arial, sans-serif" font-size="20" font-weight="700" fill="#2f6f3e">INDOOR SOURCES [SCIENCE]</text>
    <text x="112" y="583" font-family="Arial, sans-serif" font-size="32" font-weight="700" fill="#0f172a">Closed classroom</text>
    <text x="112" y="629" font-family="Arial, sans-serif" font-size="24" fill="#334155">Clothing, carpet, furniture</text>
    <text x="112" y="662" font-family="Arial, sans-serif" font-size="24" fill="#334155">Paint, supplies, tracked dust</text>
    <text x="112" y="693" font-family="Arial, sans-serif" font-size="21" fill="#166534">Wear + human activity release particles</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="650" y="315" width="360" height="270" rx="8" fill="#e3f2fd" stroke="#2563a6" stroke-width="4"/>
    <text x="682" y="360" font-family="Arial, sans-serif" font-size="20" font-weight="700" fill="#2563a6">MOVEMENT [SCIENCE]</text>
    <text x="830" y="414" text-anchor="middle" font-family="Arial, sans-serif" font-size="32" font-weight="700" fill="#0f172a">Air + activity + water</text>
    <text x="682" y="467" font-family="Arial, sans-serif" font-size="24" fill="#334155">Moving air suspends or resuspends</text>
    <text x="682" y="503" font-family="Arial, sans-serif" font-size="24" fill="#334155">People and objects track dust</text>
    <text x="682" y="539" font-family="Arial, sans-serif" font-size="24" fill="#334155">Rain and runoff wash pavement</text>
    <text x="682" y="571" font-family="Arial, sans-serif" font-size="20" fill="#1e3a8a">Routes branch and reconnect</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="1120" y="190" width="400" height="220" rx="8" fill="#f3e8ff" stroke="#7c3aed" stroke-width="4"/>
    <text x="1152" y="235" font-family="Arial, sans-serif" font-size="20" font-weight="700" fill="#6d28d9">DEPOSITION [SCIENCE]</text>
    <text x="1152" y="288" font-family="Arial, sans-serif" font-size="31" font-weight="700" fill="#0f172a">Particles settle</text>
    <text x="1152" y="334" font-family="Arial, sans-serif" font-size="24" fill="#334155">Gravity + contact move particles</text>
    <text x="1152" y="367" font-family="Arial, sans-serif" font-size="24" fill="#334155">onto floors, desks, dust, soil,</text>
    <text x="1152" y="398" font-family="Arial, sans-serif" font-size="24" fill="#334155">filters, and collection surfaces</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="1120" y="485" width="400" height="220" rx="8" fill="#e0f2f1" stroke="#287271" stroke-width="4"/>
    <text x="1152" y="530" font-family="Arial, sans-serif" font-size="20" font-weight="700" fill="#287271">DETECTION [EVIDENCE]</text>
    <text x="1152" y="583" font-family="Arial, sans-serif" font-size="31" font-weight="700" fill="#0f172a">Compare the samples</text>
    <text x="1152" y="629" font-family="Arial, sans-serif" font-size="24" fill="#334155">Filter, tape, microscope, tally</text>
    <text x="1152" y="662" font-family="Arial, sans-serif" font-size="24" fill="#334155">Indoor + outdoor + field blank</text>
    <text x="1152" y="693" font-family="Arial, sans-serif" font-size="21" fill="#115e59">Report suspected particles honestly</text>
  </g>

  <line x1="540" y1="300" x2="630" y2="390" stroke="#475569" stroke-width="5" marker-end="url(#arrow)"/>
  <line x1="540" y1="595" x2="630" y2="510" stroke="#475569" stroke-width="5" marker-end="url(#arrow)"/>
  <line x1="1020" y1="390" x2="1100" y2="320" stroke="#475569" stroke-width="5" marker-end="url(#arrow)"/>
  <line x1="1020" y1="510" x2="1100" y2="585" stroke="#475569" stroke-width="5" marker-end="url(#arrow)"/>
  <line x1="1320" y1="420" x2="1320" y2="465" stroke="#475569" stroke-width="5" marker-end="url(#arrow)"/>

  <rect x="120" y="790" width="1360" height="145" rx="8" fill="#ffffff" stroke="#0f172a" stroke-width="3"/>
  <text x="155" y="832" font-family="Arial, sans-serif" font-size="21" font-weight="700" fill="#0f172a">EVIDENCE BOUNDARY</text>
  <text x="155" y="876" font-family="Arial, sans-serif" font-size="27" font-weight="700" fill="#0f172a">Microscopy can identify suspected fibers and fragments. It cannot confirm every polymer.</text>
  <text x="155" y="914" font-family="Arial, sans-serif" font-size="23" fill="#475569">Blanks test contamination. Spectroscopy confirms material. Detection alone does not prove a health effect.</text>
</svg>
