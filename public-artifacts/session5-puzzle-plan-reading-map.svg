<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">Task 6 readings mapped to the Puzzle Plan</title>
  <desc id="desc">A five-row visual showing how Storyline Units, Let's Be Litter Free, Talking Trash, Understanding by Design, and Learning Science and Literacy Together support Piter Garcia's Puzzle Plan goals for access, identity, healing, agency, criticality, joy, and transformation.</desc>
  <defs>
    <style>
      text { font-family: Arial, Helvetica, sans-serif; letter-spacing: 0; }
      .ink { fill: #123047; }
      .white { fill: #FFFFFF; }
      .muted { fill: #4A6474; }
      .title { font-size: 38px; font-weight: 700; }
      .subtitle { font-size: 18px; font-weight: 700; }
      .claim { font-size: 18px; font-weight: 700; }
      .row-title { font-size: 21px; font-weight: 700; }
      .label { font-size: 15px; font-weight: 700; }
      .body { font-size: 18px; }
      .chip { font-size: 17px; font-weight: 700; text-anchor: middle; }
      .small { font-size: 14px; }
    </style>
  </defs>

  <rect width="1600" height="900" fill="#F7FAFC"/>
  <rect x="0" y="0" width="18" height="900" fill="#D33F72"/>

  <text x="48" y="52" class="title ink">Task 6 Readings: One Puzzle Plan, Five Design Jobs</text>
  <text x="48" y="84" class="subtitle muted">Piter Garcia | EDU486 | EQUITAS Access-to-Agency STEM | July 14, 2026</text>

  <rect x="48" y="106" width="1504" height="72" rx="6" fill="#123047"/>
  <text x="800" y="134" class="claim white" text-anchor="middle">PUZZLE PLAN CLAIMS</text>
  <text x="800" y="162" class="body white" text-anchor="middle">Access barriers are not thinking barriers | lived experience is evidence | diagnose the design, then redesign</text>

  <g id="row-1">
    <rect x="48" y="201" width="1504" height="104" rx="6" fill="#EAF5FA" stroke="#168AAD" stroke-width="3"/>
    <rect x="48" y="201" width="315" height="104" rx="6" fill="#168AAD"/>
    <text x="72" y="235" class="label white">VISIBLE COHERENCE</text>
    <text x="72" y="270" class="row-title white">Reiser: Storylines</text>
    <text x="392" y="230" class="label ink">CONTRIBUTION</text>
    <text x="392" y="261" class="body ink">Youth can explain what they are figuring out, why it matters,</text>
    <text x="392" y="286" class="body ink">and how evidence changes the shared model.</text>
    <text x="1070" y="230" class="label ink">PUZZLE PLAN PRESS</text>
    <text x="1070" y="261" class="body ink">Avoid pseudoagency; make the path visible</text>
    <text x="1070" y="286" class="body ink">without privileging fast public talk.</text>
  </g>

  <g id="row-2">
    <rect x="48" y="321" width="1504" height="104" rx="6" fill="#EAF7EF" stroke="#2A9D5B" stroke-width="3"/>
    <rect x="48" y="321" width="315" height="104" rx="6" fill="#2A9D5B"/>
    <text x="72" y="355" class="label white">EVIDENCE JUSTICE</text>
    <text x="72" y="390" class="row-title white">Smetana: Litter Free</text>
    <text x="392" y="350" class="label ink">CONTRIBUTION</text>
    <text x="392" y="381" class="body ink">Compare categories, datasets, claims, limits, policy questions,</text>
    <text x="392" y="406" class="body ink">and equivalent photo-based participation.</text>
    <text x="1070" y="350" class="label ink">PUZZLE PLAN PRESS</text>
    <text x="1070" y="381" class="body ink">Responsibility is shared but not equal:</text>
    <text x="1070" y="406" class="body ink">add power, systems, labor, and unequal burdens.</text>
  </g>

  <g id="row-3">
    <rect x="48" y="441" width="1504" height="104" rx="6" fill="#FFF4E8" stroke="#E76F51" stroke-width="3"/>
    <rect x="48" y="441" width="315" height="104" rx="6" fill="#E76F51"/>
    <text x="72" y="475" class="label white">MULTIMODAL ACTION</text>
    <text x="72" y="510" class="row-title white">Wisbrock: Talking Trash</text>
    <text x="392" y="470" class="label ink">CONTRIBUTION</text>
    <text x="392" y="501" class="body ink">Local evidence, source evaluation, vocabulary, collaboration,</text>
    <text x="392" y="526" class="body ink">revision, and public communication develop together.</text>
    <text x="1070" y="470" class="label ink">PUZZLE PLAN PRESS</text>
    <text x="1070" y="501" class="body ink">Separate scientific reasoning from reading speed,</text>
    <text x="1070" y="526" class="body ink">speech fluency, stamina, and media polish.</text>
  </g>

  <g id="row-4">
    <rect x="48" y="561" width="1504" height="104" rx="6" fill="#FFF7DE" stroke="#C28A00" stroke-width="3"/>
    <rect x="48" y="561" width="315" height="104" rx="6" fill="#C28A00"/>
    <text x="72" y="595" class="label white">VALID EVIDENCE</text>
    <text x="72" y="630" class="row-title white">Wiggins &amp; McTighe: UbD</text>
    <text x="392" y="590" class="label ink">CONTRIBUTION</text>
    <text x="392" y="621" class="body ink">Name the transfer goal, decide acceptable evidence,</text>
    <text x="392" y="646" class="body ink">then choose activities, technologies, and materials.</text>
    <text x="1070" y="590" class="label ink">PUZZLE PLAN PRESS</text>
    <text x="1070" y="621" class="body ink">Use multimodal, context-aware assessment so</text>
    <text x="1070" y="646" class="body ink">access friction is not diagnosed as inability.</text>
  </g>

  <g id="row-5">
    <rect x="48" y="681" width="1504" height="104" rx="6" fill="#F3ECFA" stroke="#6B3FA0" stroke-width="3"/>
    <rect x="48" y="681" width="315" height="104" rx="6" fill="#6B3FA0"/>
    <text x="72" y="715" class="label white">EXPANDED EXPERTISE</text>
    <text x="72" y="750" class="row-title white">Ippolito: Science + Literacy</text>
    <text x="392" y="710" class="label ink">CONTRIBUTION</text>
    <text x="392" y="741" class="body ink">Doing, talking, reading, writing, data, images, and field notes</text>
    <text x="392" y="766" class="body ink">form one inquiry system; student work guides redesign.</text>
    <text x="1070" y="710" class="label ink">PUZZLE PLAN PRESS</text>
    <text x="1070" y="741" class="body ink">Keep disciplinary purpose while widening</text>
    <text x="1070" y="766" class="body ink">language, bodymind, identity, and expression.</text>
  </g>

  <g id="dimensions">
    <rect x="48" y="811" width="190" height="47" rx="5" fill="#D33F72"/><text x="143" y="841" class="chip white">ACCESS</text>
    <rect x="252" y="811" width="190" height="47" rx="5" fill="#168AAD"/><text x="347" y="841" class="chip white">IDENTITY</text>
    <rect x="456" y="811" width="190" height="47" rx="5" fill="#2A9D5B"/><text x="551" y="841" class="chip white">HEALING</text>
    <rect x="660" y="811" width="190" height="47" rx="5" fill="#C28A00"/><text x="755" y="841" class="chip white">AGENCY</text>
    <rect x="864" y="811" width="210" height="47" rx="5" fill="#6B3FA0"/><text x="969" y="841" class="chip white">CRITICALITY</text>
    <rect x="1088" y="811" width="190" height="47" rx="5" fill="#007C78"/><text x="1183" y="841" class="chip white">JOY</text>
    <rect x="1292" y="811" width="260" height="47" rx="5" fill="#123047"/><text x="1422" y="841" class="chip white">TRANSFORMATION</text>
  </g>

  <a href="https://drive.google.com/file/d/1VVvTRQg1K2Gy9UWzvScpDk0ovPMmppQU/view" target="_blank">
    <text x="800" y="884" class="small muted" text-anchor="middle" text-decoration="underline">Click for all five source-linked summaries and the combined Invisible Invaders design rule</text>
  </a>
</svg>
