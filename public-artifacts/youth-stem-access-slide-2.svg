<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">Youth STEM story slide 2</title>
  <desc id="desc">A science evidence cycle from noticing to testing to redesigning.</desc>
  <rect width="1600" height="900" fill="#f8fbff" />
  <text x="90" y="90" font-family="Arial" font-size="52" font-weight="700" fill="#102033">Science Is An Evidence Cycle</text>
  <text x="90" y="140" font-family="Arial" font-size="28" fill="#334155">Microplastics work can connect noticing, measuring, redesigning, and advocacy.</text>
  <circle cx="800" cy="450" r="175" fill="#e0f2fe" stroke="#0369a1" stroke-width="6" />
  <circle cx="720" cy="410" r="16" fill="#ef4444" />
  <circle cx="850" cy="390" r="13" fill="#f97316" />
  <circle cx="905" cy="500" r="18" fill="#8b5cf6" />
