  <rect x="445" y="650" width="260" height="110" rx="18" fill="#ffffff" stroke="#1f2937" stroke-width="4" />
  <text x="575" y="715" text-anchor="middle" font-family="Arial" font-size="30" font-weight="700" fill="#102033">Test</text>
